version: 2
updates:
  # GitHub Actions used by workflows in .github/workflows.
  # Actions are pinned to full commit SHAs.
  # Dependabot updates the SHA and the trailing version comment together.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "03:00"
      timezone: "America/Los_Angeles"
    groups:
      actions:
        patterns:
          - "*"
    commit-message:
      prefix: "ci"
      include: "scope"

  # NuGet packages.
  # Versions are managed centrally in Directory.Packages.props,
  # so Dependabot updates the <PackageVersion> items there.
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "03:00"
      timezone: "America/Los_Angeles"
    groups:
      nuget:
        patterns:
          - "*"
    commit-message:
      prefix: "build"
      include: "scope"
