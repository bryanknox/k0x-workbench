name: CI PowerShell Workflow

on:
  push:
    branches: ['**']
    paths:
      - '.github/workflows/ci-workflow-pwsh.yml'
      - '.github/workflows/pwsh/**'
      - '.github/workflows/pwsh-unit-tests/**'
  pull_request:
    branches: ['**']
    paths:
      - '.github/workflows/ci-workflow-pwsh.yml'
      - '.github/workflows/pwsh/**'
      - '.github/workflows/pwsh-unit-tests/**'

# Ensure that only one run per branch (github.ref) and workflow.
# Cancel any previous runs that are still in progress for the same group.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-powershell-scripts:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install PowerShell modules
        shell: pwsh
        run: |
          Write-Host "Installing Pester 5.7.x module"
          Install-Module -Name Pester -Force -Scope CurrentUser `
              -RequiredVersion 5.7.0 -SkipPublisherCheck
          Write-Host "Pester module installed successfully"

      - name: Run Pester tests
        shell: pwsh
        run: |
          Write-Host "Executing Pester tests"

          $testResultsPath = Join-Path ${{ runner.temp }} 'TestResults.xml'

          # Create Pester configuration
          $pesterConfig = New-PesterConfiguration
          $pesterConfig.Run.Path = '.github/workflows/pwsh-unit-tests'
          $pesterConfig.Run.Exit = $true
          $pesterConfig.Output.Verbosity = 'Detailed'
          $pesterConfig.TestResult.Enabled = $true
          $pesterConfig.TestResult.OutputFormat = 'JUnitXml'
          $pesterConfig.TestResult.OutputPath = $testResultsPath

          # Run tests
          try {
              Invoke-Pester -Configuration $pesterConfig
              Write-Host "All PowerShell tests passed successfully"
          }
          catch {
              Write-Host "::error title=Tests Failed::PowerShell tests failed with error: $($_.Exception.Message)"
              exit 1
          }

      - name: Publish test results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: always()
        with:
          name: PowerShell Tests
          path: '${{ runner.temp }}/TestResults.xml'
          reporter: java-junit
          fail-on-error: true
